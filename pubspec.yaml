name: rapid_app
description: "Rapid — real-time peer-to-peer trivia"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.4.0
  go_router: ^14.0.0
  flutter_animate: ^4.5.0
  flutter_svg: ^2.0.10
  web_socket_channel: ^3.0.0
  dio: ^5.4.0
  firebase_auth: ^5.0.0
  google_sign_in: ^6.2.0
  sign_in_with_apple: ^6.1.0
  shared_preferences: ^2.2.0
  google_fonts: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/categories/
    - assets/avatars/
